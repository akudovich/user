name: Composer

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  composer:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.2"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate Composer config
        run: composer validate --strict

