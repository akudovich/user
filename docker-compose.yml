services:
  php:
    build: ./docker
    restart: always
    ports:
      - "80:80" # HTTP
#      - "443:443" # HTTPS
#      - "443:443/udp" # HTTP/3
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    # comment the following line in production, it provides nice human-readable logs in dev
    tty: true

volumes:
  caddy_data:
  caddy_config:
